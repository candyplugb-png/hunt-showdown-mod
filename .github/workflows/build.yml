name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.1.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.1.1/bin" >> $GITHUB_PATH

     - name: Generate placeholder textures
        run: |
          pip install Pillow --quiet
          if [ -f generate_textures.py ]; then
            python generate_textures.py
          else
            echo "generate_textures.py not found, skipping"
          fi

      - name: Build mod
        run: gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: huntmod-jar
          path: build/libs/*.jar
          if-no-files-found: error
